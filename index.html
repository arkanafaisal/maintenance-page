<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Construction</title>
    <style>
        /* Construction/Maintenance Theme Colors (Orange, Yellow, Grays) */
        :root {
            --bg-color: #f8f9fa;
            --text-color: #212529;
            --text-muted: #6c757d;
            --accent-color: #e67e22; /* Warning Orange */
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        /* Dark Mode */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #212529;
                --text-color: #f8f9fa;
                --text-muted: #adb5bd;
                --accent-color: #f39c12; /* Warning Yellow-Orange */
                --card-bg: #343a40;
                --border-color: #495057;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            background-color: var(--card-bg);
            padding: 50px 30px;
            border-radius: 8px; /* Sharper corners for standard look */
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-width: 550px;
            width: 100%;
        }

        .icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            color: var(--accent-color);
        }

        svg {
            width: 56px;
            height: 56px;
        }

        h1 {
            margin: 0 0 16px 0;
            font-size: 2rem;
            font-weight: 700;
        }

        p {
            margin: 0 0 20px 0;
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 1.05rem;
        }

        /* Responsive Adjustments for Mobile and Tablet */
        @media (max-width: 600px) {
            .container {
                padding: 40px 20px;
            }
            h1 {
                font-size: 1.6rem;
            }
            p {
                font-size: 1rem;
            }
            svg {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Maintenance Icons -->
        <div class="icons">
            <!-- Warning Triangle Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
                <path d="M12 9v4"/>
                <path d="M12 17h.01"/>
            </svg>
        </div>
        
        <h1>Under Construction</h1>
        
        <p>
            The website <span id="domain-display">you are trying to reach</span> is currently undergoing scheduled maintenance or is under construction.
        </p>
        <p>
            We apologize for any inconvenience. We are working hard to bring it back online soon. Please check back later!
        </p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hostname = window.location.hostname;
            
            if (hostname && hostname !== '' && hostname !== 'localhost' && hostname !== '127.0.0.1') {
                document.getElementById('domain-display').textContent = hostname;
            }
        });
    </script>
</body>
</html>
